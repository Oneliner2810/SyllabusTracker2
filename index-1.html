<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Syllabus Tracker 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><span>📚</span> SSC Syllabus Tracker 2025</h1>
                <div class="header-actions">
                    <button class="header-btn secondary" onclick="exportData()" title="Export your data">
                        <span>📤</span> <span>Export</span>
                    </button>
                    <button class="header-btn secondary" onclick="showImportModal()" title="Import your data">
                        <span>📥</span> <span>Import</span>
                    </button>
                    <input type="file" id="importInput" accept=".json" onchange="importFromFile(event)">
                    <button class="header-btn theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                        🌙
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="pie-chart-container" id="mainPieChart"></div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Subtopics</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-label">Completed</div>
                    <div class="stat-value" id="completedCount">0</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-label">Remaining</div>
                    <div class="stat-value" id="remainingCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Today's Done</div>
                    <div class="stat-value" id="todayCount">0</div>
                </div>
            </div>
        </section>

        <!-- Add Subject -->
        <div class="add-section">
            <input type="text" id="subjectInput" placeholder="Enter new subject name..." onkeypress="handleSubjectKeypress(event)">
            <button class="btn-primary" onclick="addSubject()">
                <span>➕</span> Add Subject
            </button>
        </div>

        <!-- Subjects Container -->
        <main id="subjectsContainer"></main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 class="modal-title" id="modalTitle">Confirm Delete</h3>
            <p class="modal-message" id="modalMessage">Are you sure you want to delete this?</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn danger" id="modalConfirmBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Confetti -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script src="app.js"></script>
</body>
</html>
